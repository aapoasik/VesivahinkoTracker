<!DOCTYPE html>
<html>

<head>
  <title>Rekisteröi tili</title>
</head>

<body>
  <h1>Rekisteröi tili</h1>

  <form action="/register" method="post">
    <p>
      Käyttäjänimi: <br />
      <input type="text" name="username" />
    </p>
    <p>
      Salasana: <br />
      <input type="password" name="password1" />
    </p>
    <p>
      Salasana uudestaan: <br />
      <input type="password" name="password2" />
    </p>
    <input type="submit" value="Luo käyttäjätili" />
  </form>
  <hr />
</body>
